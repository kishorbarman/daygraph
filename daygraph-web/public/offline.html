<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DayGraph Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Sans", system-ui, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        max-width: 380px;
        margin: 16px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      h1 { margin: 0 0 8px; font-size: 1.1rem; }
      p { margin: 0; color: #475569; font-size: 0.95rem; line-height: 1.5; }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>You are offline</h1>
      <p>
        DayGraph will sync automatically when your connection returns.
        You can keep this tab open and try again shortly.
      </p>
    </section>
  </body>
</html>
